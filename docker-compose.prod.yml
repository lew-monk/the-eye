version: "3.8"

services:
  # Infrastructure
  postgres:
    restart: always
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: legal_docs
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/shared/src/migrations/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d legal_docs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - the-eye-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - the-eye-network

  # Production services
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    networks:
      - the-eye-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://legal_user:legal_pass@postgres:5432/legal_docs
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - the-eye-network

  coreference-worker:
    build:
      context: ./packages/coreference-worker
      dockerfile: Dockerfile.prod
    environment:
      - COREF_MODEL_ARCHITECTURE=${COREF_MODEL_ARCHITECTURE:-FCoref}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - the-eye-network

volumes:
  postgres_data:
  huggingface_cache:

networks:
  the-eye-network:
    driver: bridge