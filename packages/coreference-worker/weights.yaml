    chunk_1: 0.85
    chunk_2: 0.75
    chunk_3: 0.65
    chunk_4: 0.55
    chunk_5: 0.5
    chunk_6: 0.45
    chunk_7: 0.4
    chunk_8: 0.35
    chunk_9: 0.3
    chunk_10+: 0.3

  # Briefs: front-loaded (argument summary), moderate decay
  brief:
    chunk_0: 1.0
    chunk_1: 0.85
    chunk_2: 0.75
    chunk_3: 0.65
    chunk_4: 0.55
    chunk_5: 0.5
    chunk_6: 0.45
    chunk_7: 0.4
    chunk_8: 0.35
