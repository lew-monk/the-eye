      - "(Certified\\s+Interpreter|Accredited\\s+Interpreter|Official\\s+Interpreter)"
    weight: 0.15
    ner_hint: PERSON

  # ============================================================================
  # CONTRACT PARTY (generic)
  # ============================================================================
  - role: contract_party
    jurisdictions: [all]
    patterns:
      # Formal party designations
      - "(Party\\s+of\\s+the\\s+(First|Second|Third|Fourth)\\s+Part)"
      - "(First\\s+Party|Second\\s+Party|Third\\s+Party)"
      # Incorporation/entity descriptors used in contract recitals
      - "(duly\\s+incorporated|duly\\s+organized|duly\\s+existing|duly\\s+constituted)"
      - "(a\\s+company\\s+(incorporated|limited|registered|organized|existing))"
      - "(a\\s+corporation\\s+(organized|existing|incorporated))"
      - "(a\\s+limited\\s+liability\\s+company|an?\\s+LLC)"
      - "(a\\s+business\\s+entity|a\\s+legal\\s+entity|a\\s+statutory\\s+entity)"
      - "(registered\\s+under\\s+the\\s+(Companies|Business|Partnership|LLC)\\s+[Aa]ct)"
      # Party side indicators in contract text
      - "(hereinafter\\s+(referred\\s+to\\s+as|called|known\\s+as))"
      - "(hereafter\\s+(referred\\s+to\\s+as|called))"
      - "(collectively\\s+referred\\s+to\\s+as|individually\\s+referred\\s+to\\s+as)"
      # Commercial role descriptions
      - "(in\\s+its\\s+capacity\\s+as|acting\\s+as|acting\\s+on\\s+its\\s+own\\s+behalf)"
      - "(acting\\s+for\\s+and\\s+on\\s+behalf\\s+of|for\\s+and\\s+on\\s+behalf\\s+of)"
      - "(duly\\s+authorized|duly\\s+empowered|duly\\s+appointed)"
    weight: 0.25
    ner_hint: ORG

  # ============================================================================
  # CONTRACT PARTY — Grantor / Disposing Party
  # ============================================================================
  - role: contract_grantor
    jurisdictions: [all]
    patterns:
      - "^(Lessor|Landlord|Licensor|Franchisor|Vendor|Seller|Assignor|Consignor)"
      - "^(Mortgagor|Pledgor|Chargor|Bailor|Donor|Grantor|Optionor)"
      - "^(Principal|Employer|Contractor|Outsourcer|Subcontractor)"
      - "^(Issuer|Originator|Sponsor|Depositor|Transferor|Contributor)"
      - "^(Producer|Supplier|Provider|Service\\s+Provider|Manufacturer|Distributor)"
      # Party of the first part contextually within a contract (role-based)
      - "(of\\s+the\\s+first\\s+part|the\\s+grantor|the\\s+licensor|the\\s+lessor)"
      # Lender / financing roles
      - "^(Lender|Financier|Bank|Financial\\s+Institution|Lead\\s+Arranger)"
      - "^(Creditor|Secured\\s+Party|Chargee|Mortgagee|Lienholder)"
    weight: 0.3
    ner_hint: ORG

  # ============================================================================
  # CONTRACT PARTY — Grantee / Receiving Party
  # ============================================================================
  - role: contract_grantee
    jurisdictions: [all]
    patterns:
      - "^(Lessee|Tenant|Licensee|Franchisee|Purchaser|Buyer|Assignee|Consignee)"
      - "^(Mortgagee|Pledgee|Chargee|Bailee|Donee|Grantee|Optionee)"
      - "^(Agent|Employee|Contractee|Subcontractee|Outsourcee)"
      - "^(Service\\s+Recipient|Customer|Client|Distributee|Transferee|End\\s+User)"
      # Party side indicators
      - "(of\\s+the\\s+second\\s+part|the\\s+licensee|the\\s+lessee|the\\s+purchaser)"
      - "(the\\s+borrower|the\\s+grantee|the\\s+assignee)"
    weight: 0.3
    ner_hint: ORG

  # ============================================================================
  # CONTRACT PARTY — Obligor / Financial Support
  # ============================================================================
  - role: contract_obligor
    jurisdictions: [all]
    patterns:
      - "^(Guarantor|Surety|Co-Signer|Guarantee|Indemnifier|Indemnitor)"
      - "^(Principal\\s+Debtor|Co-Debtor|Joint\\s+Debtor|Accommodation\\s+Party)"
      - "^(Performance\\s+Bond\\s+Issuer|Bond\\s+Principal|Letter\\s+of\\s+Credit\\s+Applicant)"
      # Borrower / debtor roles (distinct from grantor — borrowing ≠ selling)
      - "^(Borrower|Debtor|Obligor|Principal\\s+Debtor)"
    weight: 0.25
    ner_hint: ORG

  # ============================================================================
  # CONTRACT PARTY — Obligee / Protected Party
  # ============================================================================
  - role: contract_obligee
    jurisdictions: [all]
    patterns:
      - "^(Beneficiary|Indemnitee|Indemnified\\s+Party|Loss\\s+Payee)"
      - "^(Third\\s+Party\\s+Beneficiary|Intended\\s+Beneficiary|Incidental\\s+Beneficiary)"
      - "^(Trustee|Custodian|Escrow\\s+Agent|Fiduciary|Receiver)"
      - "^(Nominee|Representative|Personal\\s+Representative|Executor|Executrix)"
      - "^(Administrator|Administratrix|Legal\\s+Representative|Attorney-in-Fact)"
      - "^(Power\\s+of\\s+Attorney|POA|Durable\\s+Power\\s+of\\s+Attorney)"
    weight: 0.25
    ner_hint: ORG

  # ============================================================================
  # NOTARY / WITNESS TO SIGNATURE
  # ============================================================================
  - role: notary
    jurisdictions: [all]
    patterns:
      - "^(Notary\\s+Public|Notary|Commissioner\\s+for\\s+Oaths|Commissioner\\s+of\\s+Oaths)"
      - "(Notary\\s+Public\\s+for|Commissioner\\s+for\\s+Oaths\\s+for)"
      - "(duly\\s+commissioned|duly\\s+appointed\\s+Notary)"
      - "(my\\s+commission\\s+(expires|attached|hereto))"
      - "(\\[?SEAL\\]?|\\[?NOTARIAL\\s+SEAL\\]?|\\[?OFFICIAL\\s+SEAL\\]?)"
    weight: 0.15
    ner_hint: PERSON

  # ============================================================================
  # ARBITRATOR / MEDIATOR
  # ============================================================================
  - role: arbitrator
    jurisdictions: [all]
    patterns:
      - "^(Arbitrator|Mediator|Conciliator|Neutral|Umpire)"
      - "(Sole\\s+Arbitrator|Presiding\\s+Arbitrator|Panel\\s+Chair|Tribunal\\s+Chair)"
      - "(ICC\\s+Arbitrator|LCIA\\s+Arbitrator|AAA\\s+Arbitrator|SIAC\\s+Arbitrator)"
      - "(Appointed\\s+by\\s+the\\s+(ICC|LCIA|AAA|SIAC|HKIAC|KCAB))"
      - "(Neutral\\s+Evaluator|Early\\s+Neutral\\s+Evaluator|Special\\s+Master)"
      - "(Dispute\\s+Board\\s+Member|DRB\\s+Member|Dispute\\s+Adjudicator)"
    weight: 0.25
    ner_hint: PERSON
