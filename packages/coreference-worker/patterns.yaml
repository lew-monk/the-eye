# Legal role detection patterns for participant extraction.
# Multi-jurisdiction support. Patterns are matched against the canonical
# entity name extracted from coreference clusters.
#
# Edit this file to add new roles or jurisdictions.
# Bump version AND file_hash when you do.

version: 1
file_hash: ""

roles:
  # ============================================================================
  # JUDGE
  # ============================================================================
  - role: judge
    jurisdictions: [all]
    patterns:
      - "^(Judge|Hon\\.?\\s+Justice|Justice|His Lordship|Her Ladyship|Your Lordship|Your Ladyship)\\s+"
      - "^(Lady Justice|Lord Justice|The Honourable|The Hon\\.?)\\s+"
      - "(Chief Justice|Presiding Judge|Senior Judge|Administrative Judge)"
    weight: 0.4
    ner_hint: PERSON

  - role: judge
    jurisdictions: [ke, tz, ug, ng, gh, zm, za]
    patterns:
      - "^(Justice|Judge)\\s+\\w+\\s+of\\s+(the\\s+)?(High Court|Court of Appeal|Supreme Court)"
      - "(JA|Justice of Appeal)"
      - "^(J\\.|J)\\s+\\w+" # Kenyan shorthand
      - "(Principal Judge|Deputy Chief Justice|DCJ)"
    weight: 0.4
    ner_hint: PERSON

  - role: judge
    jurisdictions: [uk]
    patterns:
      - "^(Master\\s+of\\s+the\\s+Rolls|Lord Chief Justice|Master of the Rolls|President of the (Queen's|King's) Bench)"
      - "^(Lord|Lady)\\s+(Justice|Chief Justice|Judge)"
      - "(High Court Judge|Circuit Judge|Recorder|District Judge|Magistrates' Judge)"
      - "^(Master\\s+)\\w+"
    weight: 0.4
    ner_hint: PERSON

  - role: judge
    jurisdictions: [us]
    patterns:
      - "^(Chief Justice|Associate Justice|Circuit Judge|District Judge|Magistrate Judge)"
      - "^Judge\\s+\\w+"
      - "^(Justice)\\s+\\w+" # Supreme Court justices
      - "(Senior Judge|Bankruptcy Judge|Chief Judge|Presiding Judge)"
    weight: 0.4
    ner_hint: PERSON

  - role: judge
    jurisdictions: [in]
    patterns:
      - "^(Chief Justice|Justice|Judge)\\s+"
      - "(Supreme Court Judge|High Court Judge)"
    weight: 0.4
    ner_hint: PERSON

  - role: judge
    jurisdictions: [ca]
    patterns:
      - "^(Chief Justice|Justice|Judge)\\s+"
      - "(Federal Court Judge|Tax Court Judge|Supreme Court Justice)"
      - "^(Madam Justice|Mme\\s+Justice|Mme\\s+la\\s+Juge)"
    weight: 0.4
    ner_hint: PERSON

  # ============================================================================
  # MAGISTRATE
  # ============================================================================
  - role: magistrate
    jurisdictions: [all]
    patterns:
      - "^(Magistrate|RM|SRM|Chief Magistrate|Principal Magistrate|Senior Magistrate)"
      - "^(Resident Magistrate|District Magistrate|Metropolitan Magistrate)"
      - "(Magistrate\\s+\\w+|Magistrate\\s+Grade)"
      - "(Judicial Magistrate|Executive Magistrate)"
    weight: 0.35
    ner_hint: PERSON

  # ============================================================================
  # LAWYER / ADVOCATE
  # ============================================================================
  - role: lawyer
    jurisdictions: [all]
    patterns:
      - "(Advocate|Barrister|Solicitor|Attorney|Counsel\\s+for|Counsel\\s+to)"
      - "(LLB|LLM|LLD|&\\s+Co\\.|&\\s+Associates|Chambers|LLP|Law\\s+Firm|Law\\s+Offices)"
      - "(Legal\\s+Counsel|General\\s+Counsel|Chief\\s+Legal\\s+Officer)"
      - "(Of\\s+Counsel|Pro\\s+Se|Pro\\s+Bono)"
    weight: 0.3
    ner_hint: PERSON

  - role: lawyer
    jurisdictions: [ke, tz, ug, ng, gh, zm]
    patterns:
      - "^(Adv\\s+|Advocate\\s+|M/s\\.?\\s+|M/s\\s+[A-Z])"
      - "(&\\s+Co\\.\\s+Advocate|&\\s+Associates\\s+Advocate|\\s+Advocates)"
      - "^(State\\s+Counsel|Senior\\s+State\\s+Counsel)"
      - "(SC|Senior Counsel)"
    weight: 0.3
    ner_hint: PERSON

  - role: lawyer
    jurisdictions: [uk]
    patterns:
      - "^(Barrister|QC|KC|Queen's Counsel|King's Counsel|Solicitor)"
      - "(\\s+QC\\b|\\s+KC\\b)"
      - "(Inns of Court|Lincoln's Inn|Middle Temple|Inner Temple|Gray's Inn)"
    weight: 0.3
    ner_hint: PERSON

  - role: lawyer
    jurisdictions: [us]
    patterns:
      - "^(Attorney|Atty|Esq\\.?|Esquire|Counselor)"
      - "(\\s+Esq\\.?|\\s+Esquire|\\s+P\\.?A\\.?|\\s+P\\.?C\\.?|\\s+Prof\\.?\\s+Corp\\.?)"
      - "(Law\\s+Offices\\s+of|Law\\s+Practice|Legal\\s+Aid\\s+Society)"
      - "(Public\\s+Defender|Assistant\\s+Public\\s+Defender|APD)"
      - "(Federal\\s+Public\\s+Defender)"
    weight: 0.3
    ner_hint: PERSON

  - role: lawyer
    jurisdictions: [ng]
    patterns:
      - "^(SAN|Senior Advocate of Nigeria)"
      - "(&\\s+Co\\.|&\\s+Solicitors|Legal\\s+Practitioner)"
    weight: 0.3
    ner_hint: PERSON

  - role: lawyer
    jurisdictions: [in]
    patterns:
      - "^(Advocate|Senior Advocate|SA|Solicitor)"
      - "(&\\s+Associates|Law\\s+Chambers|&\\s+Co\\.)"
    weight: 0.3
    ner_hint: PERSON

  - role: lawyer
    jurisdictions: [ca]
    patterns:
      - "^(Barrister|Solicitor|Attorney|Avocat|Avocate)"
      - "(LL\\.?B\\.?|LL\\.?L\\.?|BCL|\\s+QC|\\s+c\\.?r\\.?)"
      - "(Law\\s+Corporation|Professional\\s+Corporation)"
    weight: 0.3
    ner_hint: PERSON

  # ============================================================================
