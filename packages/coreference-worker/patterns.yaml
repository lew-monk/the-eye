  # ============================================================================
  # COURT OFFICIAL
  # ============================================================================
  - role: court_official
    jurisdictions: [all]
    patterns:
      - "(Registrar|Deputy\\s+Registrar|Chief\\s+Registrar|Assistant\\s+Registrar)"
      - "(Court\\s+Clerk|Deputy\\s+Clerk|Court\\s+Recorder|Court\\s+Reporter)"
