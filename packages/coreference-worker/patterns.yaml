  # ============================================================================
  # PLAINTIFF / APPLICANT / PETITIONER
  # ============================================================================
  - role: plaintiff
    jurisdictions: [all]
    patterns:
      - "^(Plaintiff|Applicant|Petitioner|Claimant|Complainant|Informant)"
      - "(and\\s+Another|&\\s+Another)\\s*$"
      - "(suing\\s+as|suing\\s+for|suing\\s+on\\s+behalf|suing\\s+per)"
      - "(as\\s+Administrator|as\\s+Executor|as\\s+Trustee|as\\s+Next\\s+Friend)"
    weight: 0.3
    ner_hint: PERSON

  - role: plaintiff
    jurisdictions: [ke, tz, ug, ng, gh, in, lk]
    patterns:
      - "(&\\s+Another|&\\s+Others|&\\s+Sons|&\\s+Daughters)\\s*$"
    weight: 0.3
    ner_hint: PERSON

  - role: plaintiff
    jurisdictions: [us, ca]
    patterns:
      - "^(Class\\s+Action\\s+Plaintiff|Lead\\s+Plaintiff|Named\\s+Plaintiff)"
      - "(on\\s+behalf\\s+of\\s+(themselves|herself|himself)\\s+and\\s+all\\s+others)"
