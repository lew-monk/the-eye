  - role: police_officer
    jurisdictions: [in]
    patterns:
      - "(IPS|DGP|ADGP|IG|DIG|SP|ASP|DSP|SI|ASI|HC|PC|CP|DCP|ACP)"
      - "^(Commissioner\\s+of\\s+Police|Special\\s+Commissioner\\s+of\\s+Police)"
      - "^(Superintendent\\s+of\\s+Police|Additional\\s+Superintendent\\s+of\\s+Police)"
      - "^(Deputy\\s+Superintendent\\s+of\\s+Police|Assistant\\s+Commissioner\\s+of\\s+Police)"
      - "^(Inspector\\s+of\\s+Police|Sub\\s+Inspector|Assistant\\s+Sub\\s+Inspector)"
      - "^(Head\\s+Constable|Police\\s+Constable|Constable)"
