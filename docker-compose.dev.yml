version: "3.8"

services:
  # Infrastructure
  postgres:
    restart: always
    image: pgvector/pgvector:0.8.0-pg16
    environment:
      POSTGRES_DB: legal_docs
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_pass
    volumes:
      - postgres_data_vec:/var/lib/postgresql/data
      - ./packages/shared/src/migrations/init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d legal_docs"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - the-eye-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - the-eye-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    env_file:
      - ./.env
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - the-eye-network
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  # Development services with hot reload
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: web-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/packages/*/node_modules
      - /app/packages/*/dist
    depends_on:
      - api
    working_dir: /app
    networks:
      - the-eye-network
    command: sh -c "cd apps/web && bun run dev --host 0.0.0.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
      target: api-dev
    ports:
      - "3001:3001"
    env_file:
      - ./.env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
      - /app/packages/shared/node_modules
      - /app/packages/core/node_modules
      - /app/packages/workers/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    working_dir: /app
    networks:
      - the-eye-network
    command: sh -c "bun run watch:packages & cd apps/api && bun run dev"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

  coreference-worker:
    build:
      context: ./packages/coreference-worker
      dockerfile: Dockerfile.dev
    env_file:
      - ./.env
    environment:
      - COREF_MODEL_ARCHITECTURE=${COREF_MODEL_ARCHITECTURE:-FCoref}
    volumes:
      - ./packages/coreference-worker/src:/app/src
      - ./packages/coreference-worker/patterns.yaml:/app/patterns.yaml
      - ./packages/coreference-worker/titles.yaml:/app/titles.yaml
      - ./packages/coreference-worker/weights.yaml:/app/weights.yaml
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    networks:
      - the-eye-network
    command: watchfiles "python -m src.worker" /app/src
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "10"

volumes:
  postgres_data_vec:
  huggingface_cache:

networks:
  the-eye-network:
    driver: bridge
